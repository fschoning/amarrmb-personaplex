# docker/docker-compose.yaml — PersonaPlex v2 full stack
#
# Brain runs via OpenRouter (Gemini 2.0 Flash) — no GPU needed for brain.
# PP gets 100% of the Spark GPU.
#
# Start:  OPENROUTER_API_KEY=sk-... docker compose up -d
# Stop:   docker compose down

name: personaplex-v2

services:

  # -------------------------------------------------------------------------
  # Triton Inference Server — PersonaPlex pipeline (100% GPU)
  # -------------------------------------------------------------------------
  triton:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    image: personaplex-triton:latest
    restart: unless-stopped
    shm_size: '4gb'
    ipc: host                    # required for MPS daemon communication
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8001:8001"   # gRPC
      - "8000:8000"   # HTTP (diagnostics only)
      - "8002:8002"   # Prometheus metrics
    environment:
      MODEL_REPO:          "/models"
      HF_REPO:           "${HF_REPO:-}"
      HF_TOKEN:          "${HF_TOKEN:-}"
      LAVASR_HF_REPO:    "${LAVASR_HF_REPO:-YatharthS/LavaSR}"
      PERSONAPLEX_FP8:   "${PERSONAPLEX_FP8:-1}"
      LM_TEMPERATURE:    "${LM_TEMPERATURE:-0.8}"
      LM_TOP_K:          "${LM_TOP_K:-250}"
      LOAD_BRAIN:        "0"
      HF_HUB_OFFLINE:    "1"
      TRANSFORMERS_OFFLINE: "1"
      VLLM_ATTENTION_BACKEND: "FLASH_ATTN"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/models/hf-cache}:/root/.cache/huggingface
      - ${MODELS_DIR:-/mnt/models}:/mnt/models:ro
      - ../tools:/tools:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v2/health/live"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 240s

  # -------------------------------------------------------------------------
  # Brain — Gemini 2.0 Flash via OpenRouter (FastAPI proxy, no GPU needed)
  # Thin HTTP proxy: gateway → brain → OpenRouter → brain → gateway
  # Zero GPU load — all inference happens in the cloud
  # -------------------------------------------------------------------------
  brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile.brain
      network: host
    image: personaplex-brain:latest
    restart: unless-stopped
    network_mode: host
    environment:
      OPENROUTER_API_KEY:  "${OPENROUTER_API_KEY}"
      OPENROUTER_MODEL:    "${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}"
      BRAIN_PORT:          "8015"
      BRAIN_MAX_TOKENS:    "${BRAIN_MAX_TOKENS:-200}"
      BRAIN_TEMPERATURE:   "${BRAIN_TEMPERATURE:-0.7}"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8015/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  # C++ Gateway (WebSocket → Triton gRPC)
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    image: personaplex-gateway:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      triton:
        condition: service_healthy
      brain:
        condition: service_healthy
    environment:
      TRITON_GRPC_URL:    "localhost:8001"      # PP pipeline
      BRAIN_GRPC_URL:     "localhost:8015"      # Brain FastAPI HTTP
      MAX_SESSIONS:       "${MAX_SESSIONS:-6}"
      SESSION_TIMEOUT_S:  "${SESSION_TIMEOUT_S:-300}"
      WS_PORT:            "${WS_PORT:-8998}"
      SSL_CERT:           "${SSL_CERT:-}"
      SSL_KEY:            "${SSL_KEY:-}"

# No named volumes — HF cache is bind-mounted from host via HF_CACHE_DIR env var
