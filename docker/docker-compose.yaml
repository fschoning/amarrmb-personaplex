# docker/docker-compose.yaml — PersonaPlex v3 full stack
#
# v3 Architecture: Spark = generic PP server, Brain = workstation client
# Three PP instances: Active + Standby + Filler (no brain container on Spark)
#
# Start:  docker compose up -d
# Stop:   docker compose down

name: personaplex-v3

services:

  # -------------------------------------------------------------------------
  # Triton Inference Server — PersonaPlex pipeline (3 PP instances, 100% GPU)
  # -------------------------------------------------------------------------
  triton:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    image: personaplex-triton:latest
    restart: unless-stopped
    shm_size: '6gb'
    network_mode: host
    environment:
      MODEL_REPO:          "/models"
      HF_REPO:           "${HF_REPO:-}"
      HF_TOKEN:          "${HF_TOKEN:-}"
      LAVASR_HF_REPO:    "${LAVASR_HF_REPO:-YatharthS/LavaSR}"
      PERSONAPLEX_FP8:   "${PERSONAPLEX_FP8:-1}"
      LM_TEMPERATURE:    "${LM_TEMPERATURE:-0.8}"
      LM_TOP_K:          "${LM_TOP_K:-250}"
      LOAD_BRAIN:        "0"
      VLLM_ATTENTION_BACKEND: "FLASH_ATTN"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/models/hf-cache}:/root/.cache/huggingface
      - ${MODELS_DIR:-/mnt/models}:/mnt/models:ro
      - ../tools:/tools:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v2/health/live"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 240s

  # -------------------------------------------------------------------------
  # C++ Gateway (WebSocket ↔ Triton gRPC, client-driven node switching)
  # Brain runs on workstation — no brain container here.
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    image: personaplex-gateway:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      triton:
        condition: service_healthy
    environment:
      TRITON_GRPC_URL:    "localhost:8001"
      MAX_SESSIONS:       "${MAX_SESSIONS:-6}"
      SESSION_TIMEOUT_S:  "${SESSION_TIMEOUT_S:-300}"
      WS_PORT:            "${WS_PORT:-8998}"
      SSL_CERT:           "${SSL_CERT:-}"
      SSL_KEY:            "${SSL_KEY:-}"
      FILLER_PROMPT:      "${FILLER_PROMPT:-Hold on, I'm working on that for you. Just a moment.}"

# No named volumes — HF cache is bind-mounted from host via HF_CACHE_DIR env var
