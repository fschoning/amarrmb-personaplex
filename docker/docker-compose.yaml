# docker/docker-compose.yaml — PersonaPlex v2 full stack
#
# MPS MODE (zero choppiness):
#   1. Start MPS daemon:  sudo bash scripts/start_mps.sh
#   2. Start stack:       docker compose up -d
#   3. Stop:              docker compose down && sudo bash scripts/stop_mps.sh
#
# SINGLE-CONTAINER MODE (legacy, brain+PP on same GPU, choppy during brain):
#   LOAD_BRAIN=1 USE_MPS=0 docker compose up -d

name: personaplex-v2

services:

  # -------------------------------------------------------------------------
  # Triton Inference Server — PersonaPlex pipeline only
  # With MPS: gets 80% of GPU SMs (real-time audio, latency-critical)
  # -------------------------------------------------------------------------
  triton:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    image: personaplex-triton:latest
    restart: unless-stopped
    shm_size: '4gb'
    ipc: host                    # required for MPS daemon communication
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8001:8001"   # gRPC
      - "8000:8000"   # HTTP (diagnostics only)
      - "8002:8002"   # Prometheus metrics
    environment:
      MODEL_REPO:          "/models"
      HF_REPO:           "${HF_REPO:-}"
      HF_TOKEN:          "${HF_TOKEN:-}"
      LAVASR_HF_REPO:    "${LAVASR_HF_REPO:-YatharthS/LavaSR}"
      PERSONAPLEX_FP8:   "${PERSONAPLEX_FP8:-1}"
      LM_TEMPERATURE:    "${LM_TEMPERATURE:-0.8}"
      LM_TOP_K:          "${LM_TOP_K:-250}"
      LOAD_BRAIN:        "0"         # brain is in separate container
      BRAIN_ENGINE:      "${BRAIN_ENGINE:-/mnt/models/smollm3-3b-nvfp4-engine}"
      BRAIN_MODEL:       "${BRAIN_MODEL:-/mnt/models/smollm3-3b}"
      HF_HUB_OFFLINE:    "1"
      TRANSFORMERS_OFFLINE: "1"
      VLLM_ATTENTION_BACKEND: "FLASH_ATTN"
      VLLM_WORKER_MULTIPROC_METHOD: "spawn"
      # MPS: limit this container to 80% of GPU SMs
      CUDA_MPS_ACTIVE_THREAD_PERCENTAGE: "${PP_GPU_PERCENT:-80}"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/models/hf-cache}:/root/.cache/huggingface
      - ${MODELS_DIR:-/mnt/models}:/mnt/models:ro
      - ../tools:/tools:ro
      - /tmp/nvidia-mps:/tmp/nvidia-mps    # MPS daemon pipe
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v2/health/live"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 240s

  # -------------------------------------------------------------------------
  # Brain — SmolLM3-3B NVFP4 via TRT-LLM (FastAPI, separate process for MPS)
  # Uses spark-single-gpu-dev image (has tensorrt_llm for NVFP4 engine)
  # With MPS: gets 10-20% of GPU SMs (background, latency not critical)
  # -------------------------------------------------------------------------
  brain:
    image: nvcr.io/nvidia/tensorrt-llm/release:spark-single-gpu-dev
    restart: unless-stopped
    shm_size: '2gb'
    ipc: host                    # required for MPS daemon communication
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8015:8015"              # FastAPI HTTP
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install -q fastapi uvicorn 2>/dev/null
        python3 /scripts/server_brain.py
    environment:
      BRAIN_ENGINE:      "${BRAIN_ENGINE:-/mnt/models/smollm3-3b-nvfp4-engine}"
      BRAIN_MODEL:       "${BRAIN_MODEL:-/mnt/models/smollm3-3b}"
      BRAIN_PORT:        "8015"
      HF_TOKEN:          "${HF_TOKEN:-}"
      HF_HUB_OFFLINE:    "1"
      TRANSFORMERS_OFFLINE: "1"
      # MPS: limit this container to 20% of GPU SMs
      CUDA_MPS_ACTIVE_THREAD_PERCENTAGE: "${BRAIN_GPU_PERCENT:-20}"
    volumes:
      - ${HF_CACHE_DIR:-/mnt/models/hf-cache}:/root/.cache/huggingface
      - ${MODELS_DIR:-/mnt/models}:/mnt/models:ro
      - /tmp/nvidia-mps:/tmp/nvidia-mps    # MPS daemon pipe
      - ../scripts:/scripts:ro             # server_brain.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8015/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s

  # -------------------------------------------------------------------------
  # C++ Gateway (WebSocket → Triton gRPC)
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    image: personaplex-gateway:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      triton:
        condition: service_healthy
      brain:
        condition: service_healthy
    environment:
      TRITON_GRPC_URL:    "localhost:8001"      # PP pipeline
      BRAIN_GRPC_URL:     "localhost:8015"      # Brain FastAPI HTTP
      MAX_SESSIONS:       "${MAX_SESSIONS:-6}"
      SESSION_TIMEOUT_S:  "${SESSION_TIMEOUT_S:-300}"
      WS_PORT:            "${WS_PORT:-8998}"
      SSL_CERT:           "${SSL_CERT:-}"
      SSL_KEY:            "${SSL_KEY:-}"

# No named volumes — HF cache is bind-mounted from host via HF_CACHE_DIR env var
